<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibecode | Portfolio Management</title>
    
    <style>
        :root {
            --bg-color: #f4f1ea; /* Бежевый кофейный */
            --accent-gold: #d4a373;
            --dark-brown: #3d3d3d;
            --money-green: #85bb65;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: var(--dark-brown);
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 1s ease;
        }

        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        /* Стилизация бублика */
        #chart-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 30px auto;
            border: 10px solid var(--dark-brown);
            border-radius: 50%;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #laundry-canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: none; /* Скрыто до 1млн */
            filter: sepia(0.3) contrast(1.2);
        }

        .balance-display {
            font-size: 1.5rem;
            font-weight: bold;
            z-index: 5;
        }

        /* Форма добавления активов */
        .asset-form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        select, input, button {
            padding: 12px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }

        button {
            background: var(--dark-brown);
            color: #fff;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        button:hover {
            background: var(--accent-gold);
        }

        .bond-fields {
            display: none; /* Появляется только при выборе облигаций */
            margin-top: 10px;
            padding: 10px;
            background: #f9f9f9;
            border: 1px dashed var(--accent-gold);
        }

        /* Эффект тряски при стирке */
        .shaking {
            animation: shake 0.2s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, 0px); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Vibecode</h1>
    <div id="chart-container">
        <div id="laundry-canvas-container"></div>
        <div class="balance-display">
            Общий баланс:<br>
            <span id="total-amount">0</span> ₽
        </div>
    </div>

    <div class="asset-form">
        <h3>Добавить актив</h3>
        <select id="asset-type" onchange="toggleBondMenu()">
            <option value="stock">Акция</option>
            <option value="bond">Облигация</option>
        </select>

        <div id="bond-menu" class="bond-fields">
            <select id="bond-subtype">
                <option value="OFZ">ОФЗ</option>
                <option value="CORP">Корпоративная облигация</option>
            </select>
            <input type="text" id="bond-number" placeholder="Номер (ISIN)">
        </div>

        <input type="number" id="asset-value" placeholder="Сумма (₽)">
        <button onclick="addAsset()">Добавить в портфель</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let totalBalance = 0;
    let isWashingActive = false;

    // Функция переключения меню облигаций
    function toggleBondMenu() {
        const type = document.getElementById('asset-type').value;
        const bondMenu = document.getElementById('bond-menu');
        bondMenu.style.display = (type === 'bond') ? 'block' : 'none';
    }

    // Добавление актива
    function addAsset() {
        const val = parseFloat(document.getElementById('asset-value').value);
        if (isNaN(val)) return;

        totalBalance += val;
        document.getElementById('total-amount').innerText = totalBalance.toLocaleString('ru-RU');
        
        checkLaundryStatus();
        document.getElementById('asset-value').value = '';
    }

    // Проверка порога в 1 000 000
    function checkLaundryStatus() {
        if (totalBalance >= 1000000 && !isWashingActive) {
            startLaundry();
        }
    }

    // --- 3D ЛОГИКА (THREE.JS) ---
    let scene, camera, renderer, bills;

    function startLaundry() {
        isWashingActive = true;
        document.getElementById('chart-container').classList.add('shaking');
        
        const container = document.getElementById('laundry-canvas-container');
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(350, 350);
        renderer.domElement.id = "laundry-canvas";
        renderer.domElement.style.display = "block";
        container.appendChild(renderer.domElement);

        // Свет
        const light = new THREE.PointLight(0xffffff, 1, 100);
        light.position.set(0, 0, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // Купюры
        const billGeo = new THREE.PlaneGeometry(0.5, 0.25);
        const billMat = new THREE.MeshStandardMaterial({ 
            color: 0x85bb65, 
            side: THREE.DoubleSide 
        });
        
        const count = 200;
        bills = new THREE.InstancedMesh(billGeo, billMat, count);
        scene.add(bills);

        const dummy = new THREE.Object3D();
        const physics = Array.from({ length: count }, () => ({
            r: Math.random() * 2,
            angle: Math.random() * Math.PI * 2,
            speed: 0.05 + Math.random() * 0.1,
            rotSpeed: Math.random() * 0.1
        }));

        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            
            physics.forEach((p, i) => {
                p.angle += p.speed;
                const x = Math.cos(p.angle) * p.r;
                const y = Math.sin(p.angle) * p.r;
                
                dummy.position.set(x, y, Math.sin(p.angle) * 0.5);
                dummy.rotation.set(p.angle, p.angle * 0.5, 0);
                dummy.updateMatrix();
                bills.setMatrixAt(i, dummy.matrix);
            });
            
            bills.instanceMatrix.needsUpdate = true;
            renderer.render(scene, camera);
        }
        animate();
    }
</script>

</body>
</html>

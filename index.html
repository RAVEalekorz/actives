<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>actives | system</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root { --bg: #F5F5F0; --card: #FFFFFF; --text: #2C2C2C; --accent: #8B7355; --secondary: #A6A6A6; --danger: #cc0000; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 20px; }
        .header { margin-bottom: 25px; border-bottom: 1px solid #E0E0E0; padding-bottom: 10px; }
        .header h1 { font-size: 20px; font-weight: 700; color: var(--accent); margin: 0; }
        
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); border: 1px solid #EBEBEB; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { border-left: 3px solid var(--accent); padding-left: 10px; }
        .label { color: var(--secondary); font-size: 11px; text-transform: uppercase; font-weight: 600; }
        .val { font-size: 18px; font-weight: 800; margin-top: 2px; }

        input { background: #FAFAFA; border: 1px solid #E0E0E0; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px; box-sizing: border-box; font-size: 15px; }
        button { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: 700; font-size: 15px; }
        
        .asset-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dotted #EEE; }
        .del-btn { color: var(--danger); font-size: 20px; margin-left: 15px; cursor: pointer; border: none; background: none; width: auto; padding: 0; }
        #chart { width: 100%; height: 220px; }
    </style>
</head>
<body>

    <div class="header"><h1>ACTIVES.SYSTEM</h1></div>
    
    <div class="card">
        <div class="stat-grid">
            <div class="stat-box">
                <div class="label">Текущая стоимость</div>
                <div class="val" id="total-val">0 ₽</div>
            </div>
            <div class="stat-box" style="border-color: #A6A6A6;">
                <div class="label">Всего потрачено</div>
                <div class="val" id="total-spent">0 ₽</div>
            </div>
        </div>
        <div id="chart"></div>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size: 16px;">Добавить актив</h3>
        <input type="text" id="t" placeholder="Тикер (напр. SBER)">
        <input type="number" id="q" placeholder="Количество">
        <input type="number" id="p" placeholder="Цена покупки (за 1 шт)">
        <button onclick="add()">Добавить в портфель</button>
    </div>

    <div class="card">
        <h3 style="margin:0 0 10px 0; font-size: 16px;">Мои акции</h3>
        <div id="list"></div>
    </div>

    <script>
        let portfolio = JSON.parse(localStorage.getItem('portfolio')) || [];

        async function getPrice(ticker) {
            try {
                const r = await fetch(`https://iss.moex.com/iss/engines/stock/markets/shares/boards/TQBR/securities/${ticker}.json?iss.meta=off&iss.only=marketdata&marketdata.columns=LAST`);
                const d = await r.json();
                return d.marketdata.data[0][0] || 0;
            } catch { return 0; }
        }

        async function update() {
            let totalVal = 0, totalSpent = 0;
            let labels = [], values = [];
            const list = document.getElementById('list');
            list.innerHTML = '';

            for (let i = 0; i < portfolio.length; i++) {
                let a = portfolio[i];
                const curPrice = await getPrice(a.t);
                const curSum = curPrice * a.q;
                const spentSum = a.p * a.q;
                
                totalVal += curSum;
                totalSpent += spentSum;

                if (curSum > 0) { labels.push(a.t); values.push(curSum); }

                list.innerHTML += `
                    <div class="asset-item">
                        <div>
                            <div style="font-weight:700">${a.t}</div>
                            <div style="font-size:12px; color:#888">${a.q} шт. по ${a.p}₽</div>
                        </div>
                        <div style="display:flex; align-items:center">
                            <div style="text-align:right">
                                <div style="font-weight:700">${curSum.toLocaleString()} ₽</div>
                                <div style="font-size:11px; color:var(--accent)">Сейчас: ${curPrice} ₽</div>
                            </div>
                            <button class="del-btn" onclick="del(${i})">×</button>
                        </div>
                    </div>`;
            }

            document.getElementById('total-val').innerText = totalVal.toLocaleString() + ' ₽';
            document.getElementById('total-spent').innerText = totalSpent.toLocaleString() + ' ₽';
            
            if (values.length > 0) {
                Plotly.newPlot('chart', [{ values: values, labels: labels, type: 'pie', hole: .7, marker: { colors: ['#8B7355', '#C4A484', '#D2B48C', '#E5D3B3'] }, textinfo: 'none' }], 
                { paper_bgcolor: 'rgba(0,0,0,0)', showlegend: false, margin: {t:0, b:0, l:0, r:0} }, {displayModeBar: false});
            }
        }

        function add() {
            const t = document.getElementById('t').value.toUpperCase().trim();
            const q = parseFloat(document.getElementById('q').value);
            const p = parseFloat(document.getElementById('p').value);
            if(t && q && p) {
                portfolio.push({t, q, p});
                localStorage.setItem('portfolio', JSON.stringify(portfolio));
                update();
            }
        }

        function del(index) {
            portfolio.splice(index, 1);
            localStorage.setItem('portfolio', JSON.stringify(portfolio));
            update();
        }

        update();
    </script>
</body>
</html>

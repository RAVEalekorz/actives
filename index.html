<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>actives | portfolio</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root {
            --bg: #F5F5F0;
            --card: #FFFFFF;
            --text: #2C2C2C;
            --accent: #8B7355;
            --secondary: #A6A6A6;
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 20px; line-height: 1.5;
        }
        .header { margin-bottom: 30px; border-bottom: 1px solid #E0E0E0; padding-bottom: 10px; }
        .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin: 0; color: var(--accent); }
        
        .card { 
            background: var(--card); 
            border-radius: 20px; 
            padding: 24px; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            border: 1px solid #EBEBEB;
        }
        .balance-label { color: var(--secondary); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .balance-val { font-size: 32px; font-weight: 800; margin: 5px 0 20px 0; }
        
        input { 
            background: #FAFAFA; border: 1px solid #E0E0E0; color: var(--text); 
            padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 12px; 
            box-sizing: border-box; font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--accent); }
        
        button { 
            background: var(--accent); color: white; border: none; 
            padding: 16px; border-radius: 12px; width: 100%; 
            font-weight: 600; font-size: 16px; transition: 0.2s;
        }
        button:active { transform: scale(0.98); opacity: 0.9; }

        .asset-item { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px dotted #E0E0E0;
        }
        .asset-item:last-child { border: none; }
        .asset-name { font-weight: 600; font-size: 17px; }
        .asset-details { color: var(--secondary); font-size: 13px; }
        .asset-price { text-align: right; font-weight: 700; }

        #chart { width: 100%; height: 280px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ACTIVES.SYSTEM</h1>
    </div>
    
    <div class="card">
        <div class="balance-label">Total Balance</div>
        <div class="balance-val" id="total-balance">0.00 ₽</div>
        <div id="chart"></div>
    </div>

    <div class="card">
        <h3 style="margin-top:0; font-size: 18px;">New Position</h3>
        <input type="text" id="ticker" placeholder="Ticker (e.g. YDEX)" autocomplete="off">
        <input type="number" id="amount" placeholder="Quantity" inputmode="decimal">
        <button onclick="addAsset()">Add to Portfolio</button>
    </div>

    <div class="card" id="list-container">
        <h3 style="margin-top:0; font-size: 18px;">Assets</h3>
        <div id="assets-list"></div>
    </div>

    <script>
        let portfolio = JSON.parse(localStorage.getItem('portfolio')) || [];

        async function getMoexPrice(ticker) {
            try {
                const r = await fetch(`https://iss.moex.com/iss/engines/stock/markets/shares/boards/TQBR/securities/${ticker}.json?iss.meta=off&iss.only=marketdata&marketdata.columns=LAST`);
                const d = await r.json();
                if (d.marketdata.data.length > 0) {
                    return d.marketdata.data[0][0] || 0;
                }
                return 0;
            } catch (e) { return 0; }
        }

        async function update() {
            let total = 0;
            let labels = [];
            let values = [];
            const list = document.getElementById('assets-list');
            list.innerHTML = '';

            for (let a of portfolio) {
                const price = await getMoexPrice(a.t);
                const sum = price * a.q;
                total += sum;
                
                if (sum > 0) {
                    labels.push(a.t);
                    values.push(sum);
                }

                list.innerHTML += `
                    <div class="asset-item">
                        <div>
                            <div class="asset-name">${a.t}</div>
                            <div class="asset-details">${a.q} units</div>
                        </div>
                        <div class="asset-price">
                            ${sum.toLocaleString('ru-RU')} ₽
                            <div style="font-weight:400; font-size:12px; color:var(--accent)">${price} ₽/ea</div>
                        </div>
                    </div>
                `;
            }

            document.getElementById('total-balance').innerText = total.toLocaleString('ru-RU') + ' ₽';
            
            if (values.length > 0) {
                Plotly.newPlot('chart', [{
                    values: values, labels: labels, type: 'pie', hole: .8,
                    marker: { colors: ['#8B7355', '#C4A484', '#D2B48C', '#E5D3B3', '#6F4E37'] },
                    textinfo: 'none', hoverinfo: 'label+percent'
                }], {
                    paper_bgcolor: 'rgba(0,0,0,0)', showlegend: false,
                    margin: {t:0, b:0, l:0, r:0}
                }, {displayModeBar: false});
            }
        }

        function addAsset() {
            const t = document.getElementById('ticker').value.toUpperCase().trim();
            const q = document.getElementById('amount').value;
            if(t && q) {
                portfolio.push({t, q: parseFloat(q)});
                localStorage.setItem('portfolio', JSON.stringify(portfolio));
                document.getElementById('ticker').value = '';
                document.getElementById('amount').value = '';
                update();
            }
        }

        update();
    </script>
</body>
</html>

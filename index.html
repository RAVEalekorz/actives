<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACTIVES.SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root { --bg: #F5F5F0; --accent: #8B7355; --text: #2C2C2C; --card-bg: rgba(255,255,255,0.9); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        .header-text { font-family: 'Montserrat'; font-size: 14px; letter-spacing: 2px; text-align: center; padding: 20px 0; color: var(--accent); text-transform: uppercase; }
        .card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 24px; padding: 24px; margin: 0 20px 20px 20px; border: 1px solid rgba(0,0,0,0.05); position: relative; }
        .val { font-family: 'Montserrat'; font-weight: 800; }

        input, select { background: #FFF; border: 1px solid #EEE; padding: 16px; border-radius: 12px; width: 100%; margin-bottom: 12px; font-size: 16px; outline: none; box-sizing: border-box; }
        button.main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-family: 'Montserrat'; font-weight: 700; font-size: 16px; cursor: pointer; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid rgba(0,0,0,0.05); z-index: 100; }
        .nav-item { border: none; background: none; color: #A6A6A6; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active { color: var(--accent); }
        .page { display: none; } .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- ЭФФЕКТЫ ХАЙЗЕНБЕРГА --- */
        #fx-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999; display: none; }
        #walter { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); width: 280px; opacity: 0; transition: all 0.5s; }
        #bullet { position: absolute; width: 16px; height: 12px; background: #444; border-radius: 50% 20% 20% 50%; left: 50%; bottom: 180px; transform: translateX(-50%); opacity: 0; }
        #cracks { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; background: url('https://i.ibb.co/XxdXF9P/glass-crack.png') no-repeat center/contain; opacity: 0; filter: grayscale(1); }
        .bill { position: absolute; width: 60px; height: 30px; background: #85bb65; border: 2px solid #3d5a2d; border-radius: 3px; top: -50px; z-index: 1000; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .bill::after { content: '$'; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: #3d5a2d; font-weight: bold; }

        @keyframes shot { 0% { opacity: 1; bottom: 180px; } 20% { bottom: 50%; } 25% { bottom: 50%; width: 30px; height: 30px; border-radius: 50%; transform: translate(-50%, -50%) rotate(45deg); } 100% { opacity: 1; bottom: 0; } }
        @keyframes walter-die { 0% { transform: translateX(-50%) scale(1); } 30% { transform: translateX(-50%) translateY(10px); } 100% { transform: translateX(-50%) translateY(200px) rotate(-85deg); opacity: 0; } }
        @keyframes money-rain { to { transform: translateY(110vh) rotate(360deg); } }
        @keyframes shake { 0%, 100% { transform: translate(0); } 20% { transform: translate(-5px, 5px); } 40% { transform: translate(-5px, -5px); } 60% { transform: translate(5px, 5px); } 80% { transform: translate(5px, -5px); } }
    </style>
</head>
<body>

    <div id="market" class="page active">
        <div class="header-text">Портфель</div>
        <div class="card">
            <select id="assetType" onchange="toggleHint()">
                <option value="stock">Акции</option>
                <option value="bond">Облигации (ОФЗ)</option>
            </select>
            <input type="text" id="ticker" placeholder="Тикер (например, sber)">
            <div id="hint" style="font-size: 11px; color: var(--accent); margin: -5px 0 10px 5px; display: none;">Введите номер ОФЗ (напр. SU26238)</div>
            <input type="number" id="qty" placeholder="Количество">
            <input type="number" id="price" placeholder="Цена покупки">
            <button class="main-btn" onclick="addAsset()">Добавить актив</button>
        </div>
        <div class="card" id="assets-list"></div>
    </div>

    <div id="profile" class="page">
        <div class="header-text">Аналитика</div>
        <div class="card" id="main-chart-card" style="text-align: center;">
            <div style="color: #A6A6A6; font-size: 11px; text-transform: uppercase;">Общий баланс</div>
            <div id="total-val" class="val" style="font-size: 36px; color: var(--accent); margin: 10px 0;">0 ₽</div>
            <div id="chart" style="width: 100%; height: 260px;"></div>
        </div>
    </div>

    <div id="fx-layer">
        <div id="cracks"></div>
        <div id="bullet"></div>
        <div id="walter">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <path d="M100 40c-15 0-25 10-25 25v10h50V65c0-15-10-25-25-25zM60 80v80h80V80H60zm20 20h10v10H80v-10zm30 0h10v10h-10v-10z" fill="#000"/>
                <path d="M140 90l40-5" stroke="#000" stroke-width="8" fill="none"/>
            </svg>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="showPage('market', this)">Активы</button>
        <button class="nav-item" onclick="showPage('profile', this)">Профиль</button>
    </nav>

    <script>
        let portfolio = JSON.parse(localStorage.getItem('portfolio')) || [];
        let isAnimated = false;

        function toggleHint() {
            const isBond = document.getElementById('assetType').value === 'bond';
            document.getElementById('hint').style.display = isBond ? 'block' : 'none';
            document.getElementById('ticker').placeholder = isBond ? 'Номер ОФЗ' : 'Тикер (например, sber)';
        }

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            updateUI();
        }

        async function getPrice(t, type) {
            const market = type === 'stock' ? 'shares' : 'bonds';
            const board = type === 'stock' ? 'TQBR' : 'TQOB';
            try {
                const r = await fetch(`https://iss.moex.com/iss/engines/stock/markets/${market}/boards/${board}/securities/${t.toUpperCase()}.json?iss.meta=off&iss.only=marketdata&marketdata.columns=LAST`);
                const d = await r.json();
                return d.marketdata.data[0][0] || 1000;
            } catch { return 1000; }
        }

        async function addAsset() {
            const t = document.getElementById('ticker').value;
            const q = document.getElementById('qty').value;
            const p = document.getElementById('price').value;
            const type = document.getElementById('assetType').value;
            if(t && q && p) {
                portfolio.push({t, q: parseFloat(q), p: parseFloat(p), type});
                localStorage.setItem('portfolio', JSON.stringify(portfolio));
                updateUI();
            }
        }

        function triggerMillion() {
            isAnimated = true;
            const layer = document.getElementById('fx-layer');
            const walter = document.getElementById('walter');
            const bullet = document.getElementById('bullet');
            const cracks = document.getElementById('cracks');
            
            layer.style.display = 'block';
            setTimeout(() => { walter.style.opacity = '1'; }, 100);
            
            setTimeout(() => {
                bullet.style.opacity = '1';
                bullet.style.animation = 'shot 0.7s ease-out forwards';
                document.body.style.animation = 'shake 0.1s 6';
            }, 1100);

            setTimeout(() => { cracks.style.opacity = '0.4'; }, 1300);

            setTimeout(() => {
                walter.style.animation = 'walter-die 2s forwards';
                for(let i=0; i<60; i++) {
                    const bill = document.createElement('div');
                    bill.className = 'bill';
                    bill.style.left = Math.random() * 100 + 'vw';
                    bill.style.animation = `money-rain ${2 + Math.random()}s linear forwards`;
                    bill.style.animationDelay = Math.random() * 3 + 's';
                    layer.appendChild(bill);
                }
            }, 2200);

            setTimeout(() => { layer.style.opacity = '0'; setTimeout(() => { layer.style.display = 'none'; }, 1000); }, 7000);
        }

        async function updateUI() {
            let total = 0; let labels = [], values = [];
            const list = document.getElementById('assets-list'); list.innerHTML = '';

            for (let a of portfolio) {
                const curPrice = await getPrice(a.t, a.type);
                const sum = curPrice * a.q;
                total += sum; labels.push(a.t.toUpperCase()); values.push(sum);
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #F0F0F0">
                    <div><b>${a.t.toUpperCase()}</b><div style="font-size:11px; color:#999">${a.q} шт.</div></div>
                    <div class="val">${Math.round(sum).toLocaleString()} ₽</div>
                </div>`;
            }

            document.getElementById('total-val').innerText = Math.round(total).toLocaleString() + ' ₽';
            if (total >= 1000000 && !isAnimated) triggerMillion();
            
            if (values.length > 0) {
                Plotly.newPlot('chart', [{ 
                    values, labels, type: 'pie', hole: .75, 
                    marker: { colors: ['#3D352E', '#8B7355', '#D2B48C', '#E5D3B3', '#F0F0F0'] }, 
                    textinfo: 'none' 
                }], { paper_bgcolor: 'rgba(0,0,0,0)', showlegend: false, margin: {t:0, b:0, l:0, r:0} }, {displayModeBar: false});
            }
        }
        updateUI();
    </script>
</body>
</html>

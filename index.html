<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBECODE | Actives System</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root { --bg: #F5F5F0; --accent: #8B7355; --text: #2C2C2C; --card: rgba(255,255,255,0.9); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        .header-text { font-family: 'Montserrat'; font-size: 13px; letter-spacing: 3px; text-align: center; padding: 25px 0; color: var(--accent); text-transform: uppercase; font-weight: 800; }
        .card { background: var(--card); backdrop-filter: blur(15px); border-radius: 28px; padding: 24px; margin: 0 20px 20px 20px; border: 1px solid rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .val { font-family: 'Montserrat'; font-weight: 800; }

        input, select { background: #FFF; border: 1px solid #EEE; padding: 16px; border-radius: 14px; width: 100%; margin-bottom: 12px; font-size: 16px; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        button.main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 16px; width: 100%; font-family: 'Montserrat'; font-weight: 700; font-size: 16px; cursor: pointer; active { transform: scale(0.98); } }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid rgba(0,0,0,0.05); z-index: 2000; }
        .nav-item { border: none; background: none; color: #A6A6A6; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
        .page { display: none; } .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HEISENBERG ENGINE --- */
        #fx-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1500; display: none; }
        
        /* Уолтер внутри пончика */
        #walter-portal { 
            position: absolute; top: 52%; left: 50%; transform: translate(-50%, -40%) scale(0.4);
            width: 260px; height: 260px;
            background: url('https://i.ibb.co/L5f082Q/walter-white-png.png') no-repeat bottom center/contain;
            opacity: 0; transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 1;
        }
        
        #glass-shards { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparentpng.com/download/broken-glass/broken-glass-transparent-background-10.png') no-repeat center/contain;
            opacity: 0; transform: scale(1.5); z-index: 1600; filter: contrast(1.2); transition: 0.1s;
        }

        #bullet-fly { 
            position: absolute; width: 25px; height: 18px; opacity: 0; left: 50%; top: 50%;
            transform: translate(-50%, -50%); z-index: 1550;
        }

        .money-bill { 
            position: absolute; width: 90px; height: 45px; 
            background: url('https://i.ibb.co/m0fWd6L/dollar-stack.png') no-repeat center/contain;
            z-index: 1700; top: -100px;
        }

        @keyframes bullet-anim {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.1); }
            50% { transform: translate(-50%, -50%) scale(4); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(10); }
        }
        @keyframes walter-death {
            0% { transform: translate(-50%, -40%) scale(0.8); }
            100% { transform: translate(-50%, 150%) scale(0.5) rotate(-45deg); opacity: 0; }
        }
        @keyframes money-fall { to { transform: translateY(115vh) rotate(360deg); } }
        @keyframes shake-screen { 0% { transform: translate(0); } 20% { transform: translate(-10px, 10px); } 40% { transform: translate(10px, -10px); } 60% { transform: translate(-10px, -10px); } 80% { transform: translate(10px, 10px); } 100% { transform: translate(0); } }
    </style>
</head>
<body>

    <div id="market" class="page active">
        <div class="header-text">Portfolio Management</div>
        <div class="card">
            <select id="assetType">
                <option value="stock">Акция (Ticker)</option>
                <option value="bond">Облигация (ОФЗ/Корп)</option>
            </select>
            <input type="text" id="ticker" placeholder="Тикер (напр. sber или su26238)">
            <input type="number" id="qty" placeholder="Количество">
            <input type="number" id="price" placeholder="Цена покупки">
            <button class="main-btn" onclick="addAsset()">Добавить актив</button>
        </div>
        <div class="card" id="assets-list" style="max-height: 300px; overflow-y: auto;"></div>
    </div>

    <div id="profile" class="page">
        <div class="header-text">Market Analytics</div>
        <div class="card" id="donut-card" style="text-align: center; height: 420px; padding-top: 40px;">
            <div id="walter-portal"></div>
            <div style="color: #A6A6A6; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; position: relative; z-index: 5;">Capital Balance</div>
            <div id="total-val" class="val" style="font-size: 38px; color: var(--accent); margin: 5px 0; position: relative; z-index: 5;">0 ₽</div>
            <div id="chart" style="width: 100%; height: 320px; position: relative; z-index: 2;"></div>
        </div>
    </div>

    <div id="fx-canvas">
        <div id="glass-shards"></div>
        <div id="bullet-fly">
            <svg viewBox="0 0 100 70">
                <path d="M10 20 L80 20 Q100 35 80 50 L10 50 Z" fill="#B8860B" />
                <rect x="0" y="22" width="15" height="26" fill="#444" />
            </svg>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="showPage('market', this)">Активы</button>
        <button class="nav-item" onclick="showPage('profile', this)">Профиль</button>
    </nav>

    <script>
        let portfolio = JSON.parse(localStorage.getItem('portfolio')) || [];
        let heisenDone = false;

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            updateUI();
            if (id === 'profile' && !heisenDone) checkThreshold();
        }

        async function getPrice(t, type) {
            const cleanT = t.toUpperCase().trim();
            const boards = type === 'stock' ? ['TQBR'] : ['TQOB', 'TQCB'];
            const market = type === 'stock' ? 'shares' : 'bonds';
            for (let board of boards) {
                try {
                    const r = await fetch(`https://iss.moex.com/iss/engines/stock/markets/${market}/boards/${board}/securities/${cleanT}.json?iss.meta=off&iss.only=marketdata&marketdata.columns=LAST`);
                    const d = await r.json();
                    if (d.marketdata.data.length > 0 && d.marketdata.data[0][0]) return d.marketdata.data[0][0];
                } catch {}
            }
            return 1200; // Дефолт
        }

        function addAsset() {
            const t = document.getElementById('ticker').value;
            const q = document.getElementById('qty').value;
            const p = document.getElementById('price').value;
            const type = document.getElementById('assetType').value;
            if(t && q && p) {
                portfolio.push({t, q: parseFloat(q), p: parseFloat(p), type});
                localStorage.setItem('portfolio', JSON.stringify(portfolio));
                updateUI();
            }
        }

        async function checkThreshold() {
            let total = 0;
            for (let a of portfolio) {
                const curPrice = await getPrice(a.t, a.type);
                total += curPrice * a.q;
            }
            if (total >= 1000000 && !heisenDone) startCinema();
        }

        function startCinema() {
            heisenDone = true;
            const fx = document.getElementById('fx-canvas');
            const walter = document.getElementById('walter-portal');
            const bullet = document.getElementById('bullet-fly');
            const glass = document.getElementById('glass-shards');
            
            fx.style.display = 'block';
            
            // 1. Уолтер появляется в дырке пончика
            setTimeout(() => { 
                walter.style.opacity = '1'; 
                walter.style.transform = 'translate(-50%, -40%) scale(0.8)';
            }, 500);
            
            // 2. Выстрел (пролет пули в лицо)
            setTimeout(() => {
                bullet.style.opacity = '1';
                bullet.style.animation = 'bullet-anim 0.6s ease-in forwards';
            }, 1800);

            // 3. Удар об стекло
            setTimeout(() => {
                document.body.style.animation = 'shake-screen 0.1s 8';
                glass.style.opacity = '0.6';
                glass.style.transform = 'scale(1)';
            }, 2300);

            // 4. Падение и Деньги
            setTimeout(() => {
                walter.style.animation = 'walter-death 2.5s forwards';
                for(let i=0; i<50; i++) {
                    setTimeout(() => {
                        const bill = document.createElement('div');
                        bill.className = 'money-bill';
                        bill.style.left = Math.random() * 100 + 'vw';
                        bill.style.animation = `money-fall ${2 + Math.random()}s linear forwards`;
                        fx.appendChild(bill);
                    }, i * 120);
                }
            }, 3200);

            // Финал
            setTimeout(() => {
                fx.style.opacity = '0';
                setTimeout(() => fx.style.display = 'none', 1000);
            }, 9000);
        }

        async function updateUI() {
            let total = 0; let labels = [], values = [];
            const list = document.getElementById('assets-list'); list.innerHTML = '';
            for (let a of portfolio) {
                const curPrice = await getPrice(a.t, a.type);
                const sum = curPrice * a.q; total += sum; 
                labels.push(a.t.toUpperCase()); values.push(sum);
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:14px 0; border-bottom:1px solid #F2F2F2">
                    <div style="font-weight:600">${a.t.toUpperCase()} <span style="font-size:11px; color:#999; font-weight:400">${a.q} шт.</span></div>
                    <div class="val">${Math.round(sum).toLocaleString()} ₽</div>
                </div>`;
            }
            document.getElementById('total-val').innerText = Math.round(total).toLocaleString() + ' ₽';
            if (values.length > 0) {
                Plotly.newPlot('chart', [{ 
                    values, labels, type: 'pie', hole: .82, 
                    marker: { colors: ['#3D352E', '#8B7355', '#D2B48C', '#E5D3B3', '#C0C0C0'] }, 
                    textinfo: 'none' 
                }], { paper_bgcolor: 'rgba(0,0,0,0)', showlegend: false, margin: {t:0, b:0, l:0, r:0} }, {displayModeBar: false});
            }
        }
        updateUI();
    </script>
</body>
</html>

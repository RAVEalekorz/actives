<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBECODE | Ultimate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root { --bg: #F2F2F7; --card: #FFFFFF; --black: #1C1C1E; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: var(--bg); color: var(--black); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; padding-bottom: 100px; }

        /* Apple UI */
        .header { padding: 40px 20px 10px; font-size: 34px; font-weight: 900; letter-spacing: -1px; }
        .card { background: var(--card); border-radius: 24px; padding: 24px; margin: 10px 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.05); position: relative; }
        
        input, select { background: #F2F2F7; border: none; padding: 16px; border-radius: 14px; width: 100%; margin-bottom: 12px; font-size: 17px; outline: none; font-family: inherit; }
        .btn { background: var(--black); color: white; border: none; padding: 18px; border-radius: 16px; width: 100%; font-weight: 700; font-size: 17px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); opacity: 0.9; }

        .nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 92%; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 18px; border-radius: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); z-index: 2000; }
        .nav-btn { border: none; background: none; color: #8E8E93; font-weight: 700; font-size: 12px; text-transform: uppercase; }
        .nav-btn.active { color: var(--black); }

        .page { display: none; } .page.active { display: block; animation: appleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes appleIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- EFFECTS ENGINE --- */
        #fx-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1500; display: none; perspective: 1000px; }
        
        #walter-target { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -45%) scale(0.1);
            width: 320px; height: 450px; opacity: 0;
            background: url('https://i.postimg.cc/85M6m7Yn/walter-pants.png') no-repeat center bottom/contain;
            transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #bullet { 
            position: absolute; width: 60px; height: 30px; left: 50%; top: 46%; 
            transform: translate(-50%, -50%) scale(0); opacity: 0;
        }

        #glass {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparentpng.com/download/broken-glass/broken-glass-transparent-background-10.png') no-repeat center/cover;
            opacity: 0; transition: 0.1s;
        }

        /* Реалистичные купюры */
        .money { 
            position: absolute; width: 120px; height: 60px; top: -100px;
            filter: drop-shadow(5px 10px 15px rgba(0,0,0,0.2));
            will-change: transform;
        }

        @keyframes bullet-anim {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(25) rotate(20deg); }
        }
        @keyframes fall {
            0% { transform: translateY(0) rotateX(0) rotateY(0) rotateZ(0); }
            100% { transform: translateY(110vh) rotateX(720deg) rotateY(360deg) rotateZ(180deg); }
        }
        @keyframes shock { 0% { transform: scale(1); } 10% { transform: scale(1.1) translate(-10px, 10px); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="market" class="page active">
        <div class="header">Активы</div>
        <div class="card">
            <input type="text" id="tk" placeholder="Тикер">
            <input type="number" id="qt" placeholder="Количество">
            <input type="number" id="pr" placeholder="Цена покупки">
            <button class="btn" onclick="add()">Добавить</button>
        </div>
        <div id="list"></div>
    </div>

    <div id="profile" class="page">
        <div class="header">Профиль</div>
        <div class="card" style="height: 450px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div id="walter-target"></div>
            <div id="total" style="font-size: 36px; font-weight: 900; z-index: 5;">0 ₽</div>
            <div id="chart" style="width: 100%; height: 350px; z-index: 2;"></div>
        </div>
    </div>

    <div id="fx-layer">
        <div id="glass"></div>
        <div id="bullet">
            <svg viewBox="0 0 100 50"><path d="M10 10 H70 Q100 25 70 40 H10 Z" fill="#C5A059"/><rect x="0" y="10" width="20" height="30" fill="#333"/></svg>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="nav('market', this)">Портфель</button>
        <button class="nav-btn" onclick="nav('profile', this)">Аналитика</button>
    </nav>

    <script>
        let assets = JSON.parse(localStorage.getItem('v_assets')) || [];
        let done = false;

        function nav(p, b) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(p).classList.add('active');
            b.classList.add('active');
            render();
            if(p === 'profile') check();
        }

        function add() {
            const t = document.getElementById('tk').value, q = document.getElementById('qt').value, p = document.getElementById('pr').value;
            if(t && q && p) { assets.push({t, q, p}); localStorage.setItem('v_assets', JSON.stringify(assets)); render(); }
        }

        function check() {
            let sum = assets.reduce((a, b) => a + (b.q * b.p), 0);
            if(sum >= 1000000 && !done) {
                done = true;
                const fx = document.getElementById('fx-layer'), w = document.getElementById('walter-target'), b = document.getElementById('bullet'), g = document.getElementById('glass');
                fx.style.display = 'block';
                
                setTimeout(() => { w.style.opacity = '1'; w.style.transform = 'translate(-50%, -45%) scale(0.75)'; }, 600);
                setTimeout(() => { b.style.opacity = '1'; b.style.animation = 'bullet-anim 0.4s ease-in forwards'; }, 2200);
                setTimeout(() => { document.body.style.animation = 'shock 0.3s'; g.style.opacity = '1'; rain(); }, 2500);
            }
        }

        function rain() {
            const fx = document.getElementById('fx-layer');
            for(let i=0; i<60; i++) {
                setTimeout(() => {
                    const m = document.createElement('div');
                    m.className = 'money';
                    m.style.left = Math.random() * 100 + 'vw';
                    m.style.animation = `fall ${2 + Math.random() * 2}s linear forwards`;
                    // SVG Реалистичного доллара с градиентом
                    m.innerHTML = `
                        <svg viewBox="0 0 120 60">
                            <defs>
                                <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#85bb65" />
                                    <stop offset="100%" style="stop-color:#67924e" />
                                </linearGradient>
                            </defs>
                            <rect width="120" height="60" fill="url(#g)" rx="4" stroke="#3d5a2d" stroke-width="1"/>
                            <circle cx="60" cy="30" r="18" fill="rgba(255,255,255,0.1)" stroke="rgba(0,0,0,0.1)"/>
                            <text x="60" y="38" font-family="Arial" font-size="25" text-anchor="middle" fill="#2d4a1d" opacity="0.6">$</text>
                            <rect x="5" y="5" width="110" height="50" fill="none" stroke="rgba(0,0,0,0.05)" stroke-dasharray="2,2"/>
                        </svg>`;
                    fx.appendChild(m);
                }, i * 100);
            }
        }

        function render() {
            let total = 0; let labels = [], values = [];
            const l = document.getElementById('list'); l.innerHTML = '';
            assets.forEach(i => {
                let s = i.q * i.p; total += s; labels.push(i.t.toUpperCase()); values.push(s);
                l.innerHTML += `<div class="card" style="margin:8px 20px; display:flex; justify-content:space-between; padding:18px"><b>${i.t}</b><span>${Math.round(s).toLocaleString()} ₽</span></div>`;
            });
            document.getElementById('total').innerText = Math.round(total).toLocaleString() + ' ₽';
            if(values.length) {
                Plotly.newPlot('chart', [{ values, labels, type: 'pie', hole: .84, marker: { colors: ['#1C1C1E', '#3A3A3C', '#636366'] }, textinfo: 'none' }], 
                { paper_bgcolor: 'rgba(0,0,0,0)', showlegend: false, margin: {t:0,b:0,l:0,r:0} }, {displayModeBar: false});
            }
        }
        render();
    </script>
</body>
</html>

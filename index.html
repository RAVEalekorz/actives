<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE PRIVATE | The Final Cut</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root { --ivory: #F9F9F7; --graphite: #1C1C1C; --gold: #AF9675; --border: rgba(28,28,28,0.08); }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: var(--ivory); color: var(--graphite); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 120px; overflow: hidden; transition: transform 0.5s cubic-bezier(0.2, 0, 0, 1); }

        /* UI Elements */
        .header { font-family: 'Playfair Display', serif; padding: 60px 25px 20px; font-size: 32px; }
        .card { background: white; border-radius: 16px; padding: 25px; margin: 10px 20px; border: 1px solid var(--border); position: relative; }
        .btn-main { background: var(--graphite); color: white; border: none; padding: 20px; border-radius: 12px; width: 100%; font-weight: 600; text-transform: uppercase; cursor: pointer; }
        .nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 14px; border-radius: 40px; border: 1px solid var(--border); z-index: 2000; }
        .nav-item { border: none; background: none; color: #A0A0A0; font-weight: 700; font-size: 11px; text-transform: uppercase; }
        .nav-item.active { color: var(--graphite); }
        .page { display: none; } .page.active { display: block; }

        /* --- THE CINEMATIC ENGINE --- */
        #fx-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 3000; display: none; }
        
        #walter-wrap {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%) scale(0.65);
            width: 250px; height: 350px; opacity: 0; transition: all 2s ease;
            transform-origin: bottom center;
        }

        #bullet { 
            position: absolute; width: 40px; height: 20px; left: 50%; top: 48%; 
            transform: translate(-50%, -50%) scale(0); opacity: 0; 
        }

        #shatter-svg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            opacity: 0; transition: opacity 0.3s, transform 1s; 
        }

        /* Animations */
        @keyframes bullet-impact {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.2); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(15); }
            50% { opacity: 1; transform: translate(-50%, 500px) rotate(90deg); } /* Падает вниз */
            100% { opacity: 0; transform: translate(-50%, 600px); }
        }

        @keyframes walter-collapse {
            0% { transform: translate(-50%, -50%) scale(0.65) rotate(0deg); }
            40% { transform: translate(-50%, -50%) scale(0.65) rotate(0deg); } /* Стоит */
            60% { transform: translate(-50%, -20%) scale(0.65) translateY(50px); } /* На колени */
            100% { transform: translate(-40%, -10%) scale(0.65) rotate(-85deg); opacity: 0; } /* Набок и исчезновение */
        }

        .falling-cash { position: absolute; width: 100px; height: 50px; top: -100px; }
        @keyframes cash-rain { 
            0% { transform: translateY(0) rotateX(0); opacity: 1; } 
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotateX(720deg); opacity: 0; } 
        }
    </style>
</head>
<body>

    <div id="m-page" class="page active">
        <div class="header">Assets Management</div>
        <div class="card">
            <input type="text" id="a-t" placeholder="Ticker (e.g. SBER)">
            <input type="number" id="a-q" placeholder="Quantity">
            <input type="number" id="a-p" placeholder="Price">
            <button class="btn-main" onclick="add()">Confirm Trade</button>
        </div>
        <div id="a-list"></div>
    </div>

    <div id="p-page" class="page">
        <div class="header">Private Wealth</div>
        <div class="card" style="height: 480px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div id="walter-wrap">
                <svg viewBox="0 0 200 300">
                    <path d="M100 40c-15 0-25 10-25 25v10c-5 0-10 5-10 10v40h70v-40c0-5-5-10-10-10v-10c0-15-10-25-25-25z" fill="#E8C1A0"/> 
                    <rect x="75" y="85" width="50" height="70" rx="3" fill="#4B6344"/>
                    <rect x="82" y="155" width="36" height="22" rx="2" fill="#F3E5D8"/>
                    <path d="M85 177 L75 255 M115 177 L125 255" stroke="#E8C1A0" stroke-width="12" stroke-linecap="round"/>
                    <path d="M75 255h-15l-5 12h25z M125 255h15l5 12h-25z" fill="#5D4037"/> 
                    <rect id="gun" x="52" y="95" width="22" height="10" rx="2" fill="#212121" transform="rotate(-15 52 95)"/>
                </svg>
            </div>
            <div id="total-val" style="font-size: 42px; font-weight: 700;">0.00 ₽</div>
            <div id="chart" style="width: 100%; height: 380px;"></div>
        </div>
    </div>

    <div id="fx-canvas">
        <svg id="shatter-svg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
            <path d="M500 500 L0 0 M500 500 L1000 200 M500 500 L800 1000 M500 500 L100 900 M500 500 L400 0" stroke="white" stroke-width="4" fill="none"/>
        </svg>
        <div id="bullet">
            <svg viewBox="0 0 100 50"><path d="M10 10 H70 Q100 25 70 40 H10 Z" fill="#D4AF37"/><rect x="0" y="10" width="20" height="30" fill="#333"/></svg>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-item active" onclick="tab('m-page', this)">Market</button>
        <button class="nav-item" onclick="tab('p-page', this)">Portfolio</button>
    </nav>

    <script>
        let assets = JSON.parse(localStorage.getItem('v_wealth_v3')) || [];
        let done = false;

        function tab(id, b) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            b.classList.add('active');
            render();
            if(id === 'p-page') check();
        }

        function add() {
            const t = document.getElementById('a-t').value.toUpperCase(), q = parseFloat(document.getElementById('a-q').value), p = parseFloat(document.getElementById('a-p').value);
            if(t && q && p) { assets.push({t, q, p}); localStorage.setItem('v_wealth_v3', JSON.stringify(assets)); render(); }
        }

        function check() {
            let total = assets.reduce((a, b) => a + (b.q * b.p), 0);
            if(total >= 1000000 && !done) {
                done = true;
                const fx = document.getElementById('fx-canvas'), w = document.getElementById('walter-wrap'), b = document.getElementById('bullet'), s = document.getElementById('shatter-svg');
                fx.style.display = 'block';
                
                // 1. Появление Уолтера (медленно)
                setTimeout(() => { w.style.opacity = '1'; }, 500);
                
                // 2. Выстрел
                setTimeout(() => { 
                    b.style.opacity = '1'; 
                    b.style.animation = 'bullet-impact 1.5s cubic-bezier(0.12, 0, 0.39, 0) forwards'; 
                }, 3000);

                // 3. Удар, трещины и падение Уолтера
                setTimeout(() => { 
                    s.style.opacity = '1'; 
                    document.body.style.transform = 'scale(1.05)';
                    w.style.animation = 'walter-collapse 4s ease-in-out forwards';
                    rain(); 
                }, 3350);

                // 4. Финал: всё исчезает и "всасывается"
                setTimeout(() => {
                    s.style.opacity = '0';
                    s.style.transform = 'scale(0.1)';
                    document.body.style.transform = 'scale(1)';
                    setTimeout(() => { fx.style.display = 'none'; }, 1000);
                }, 8500);
            }
        }

        function rain() {
            const fx = document.getElementById('fx-canvas');
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const m = document.createElement('div');
                    m.className = 'falling-cash';
                    m.style.left = Math.random() * 100 + 'vw';
                    m.style.animation = `cash-rain 3s linear forwards`;
                    m.innerHTML = `<svg viewBox="0 0 100 50"><rect width="100" height="50" fill="#78866b" rx="2"/><path d="M0 25 Q50 0 100 25" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="3"/><text x="50" y="35" font-family="Arial" font-size="20" text-anchor="middle" fill="#2d3326" font-weight="bold">$</text></svg>`;
                    fx.appendChild(m);
                }, i * 100);
            }
        }

        function render() {
            let total = 0; let labels = [], values = [];
            const list = document.getElementById('a-list'); list.innerHTML = '';
            assets.forEach(a => {
                let s = a.q * a.p; total += s; labels.push(a.t); values.push(s);
                list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between"><b>${a.t}</b><span>${Math.round(s).toLocaleString()} ₽</span></div>`;
            });
            document.getElementById('total-val').innerText = Math.round(total).toLocaleString() + '.00 ₽';
            if(values.length) {
                Plotly.newPlot('chart', [{ values, labels, type: 'pie', hole: .85, marker: { colors: ['#1C1C1C', '#AF9675'] }, textinfo: 'none' }], { paper_bgcolor: 'rgba(0,0,0,0)', showlegend: false, margin: {t:0,b:0,l:0,r:0} }, {displayModeBar: false});
            }
        }
        render();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE PRIVATE | Wealth Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root { --ivory: #F9F9F7; --graphite: #1C1C1C; --gold: #AF9675; --border: rgba(28,28,28,0.08); --error: #A52A2A; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        
        body { background: var(--ivory); color: var(--graphite); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 120px; overflow-x: hidden; }

        /* --- OLD MONEY UI --- */
        .header { font-family: 'Playfair Display', serif; padding: 60px 25px 20px; font-size: 32px; letter-spacing: -0.5px; }
        .card { background: white; border-radius: 16px; padding: 25px; margin: 10px 20px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.02); position: relative; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 6px; letter-spacing: 1px; }
        input, select { background: #FFFFFF; border: 1px solid var(--border); padding: 16px; border-radius: 10px; width: 100%; font-size: 16px; font-family: inherit; }
        
        .btn-main { background: var(--graphite); color: white; border: none; padding: 20px; border-radius: 12px; width: 100%; font-weight: 600; font-size: 14px; cursor: pointer; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; }

        /* Удаление актива */
        .del-btn { color: var(--error); background: none; border: none; font-size: 20px; cursor: pointer; padding: 10px; line-height: 1; opacity: 0.3; transition: 0.3s; }
        .del-btn:hover { opacity: 1; }

        /* Навигация */
        .nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; background: rgba(255,255,255,0.8); backdrop-filter: blur(25px); display: flex; justify-content: space-around; padding: 14px; border-radius: 40px; border: 1px solid var(--border); z-index: 2000; }
        .nav-item { border: none; background: none; color: #A0A0A0; font-weight: 700; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; }
        .nav-item.active { color: var(--graphite); border-bottom: 1.5px solid var(--gold); }

        .page { display: none; } 
        .page.active { display: block; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- FX ENGINE --- */
        #fx-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 3000; display: none; }
        #walter-art { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -42%) scale(0.1); width: 280px; height: 400px; opacity: 0; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
        #bullet { position: absolute; width: 60px; height: 30px; left: 50%; top: 48%; transform: translate(-50%, -50%) scale(0); opacity: 0; }
        #shatter { position: fixed; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; }

        .cash { position: absolute; width: 110px; height: 55px; top: -120px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        @keyframes bullet-hit { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(25) rotate(15deg); } }
        @keyframes cash-fall { 0% { transform: translateY(0) rotateX(0) rotateY(0); } 100% { transform: translateY(120vh) rotateX(1080deg) rotateY(360deg); } }
    </style>
</head>
<body>

    <div id="m-page" class="page active">
        <div class="header">Market Assets</div>
        <div class="card">
            <div class="input-group">
                <label>Asset Class</label>
                <select id="a-type">
                    <option value="stock">Equity (Акции)</option>
                    <option value="bond">Fixed Income (Облигации)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Ticker Symbol</label>
                <input type="text" id="a-t" placeholder="SBER, OFZ26238...">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>Quantity</label>
                    <input type="number" id="a-q" placeholder="0">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Avg Price (₽)</label>
                    <input type="number" id="a-p" placeholder="0.00">
                </div>
            </div>
            <button class="btn-main" onclick="add()">Add Asset</button>
        </div>
        <div id="a-list"></div>
    </div>

    <div id="p-page" class="page">
        <div class="header">Private Wealth</div>
        <div class="card" style="height: 480px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div id="walter-art">
                <svg viewBox="0 0 200 300">
                    <path d="M100 40c-15 0-25 10-25 25v10c-5 0-10 5-10 10v40h70v-40c0-5-5-10-10-10v-10c0-15-10-25-25-25z" fill="#E8C1A0"/> 
                    <rect x="75" y="85" width="50" height="70" rx="3" fill="#4B6344"/>
                    <rect x="82" y="155" width="36" height="22" rx="2" fill="#F3E5D8"/>
                    <path d="M85 177 L75 255 M115 177 L125 255" stroke="#E8C1A0" stroke-width="12" stroke-linecap="round"/>
                    <path d="M75 255h-15l-5 12h25z M125 255h15l5 12h-25z" fill="#5D4037"/> 
                    <rect x="52" y="95" width="22" height="10" rx="2" fill="#212121" transform="rotate(-15 52 95)"/>
                </svg>
            </div>
            <div id="total-val" style="font-size: 42px; font-weight: 700; z-index: 10;">0.00 ₽</div>
            <div id="chart" style="width: 100%; height: 380px; z-index: 5;"></div>
        </div>
    </div>

    <div id="fx-canvas">
        <svg id="shatter" viewBox="0 0 1000 1000">
            <path d="M500 500 L0 100 M500 500 L1000 300 M500 500 L800 1000 M500 500 L200 900 M500 500 L450 0" stroke="white" stroke-width="3" fill="none"/>
        </svg>
        <div id="bullet">
            <svg viewBox="0 0 100 50"><path d="M10 10 H70 Q100 25 70 40 H10 Z" fill="#D4AF37"/><rect x="0" y="10" width="20" height="30" fill="#333"/></svg>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-item active" onclick="tab('m-page', this)">MARKET</button>
        <button class="nav-item" onclick="tab('p-page', this)">ANALYTICS</button>
    </nav>

    <script>
        let assets = JSON.parse(localStorage.getItem('v_wealth_final')) || [];
        let fx = false;

        function tab(id, b) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            b.classList.add('active');
            render();
            if(id === 'p-page') check();
        }

        function add() {
            const t = document.getElementById('a-t').value.toUpperCase().trim();
            const q = parseFloat(document.getElementById('a-q').value);
            const p = parseFloat(document.getElementById('a-p').value);
            const type = document.getElementById('a-type').value;

            if(t && q && p) {
                // Схлопывание: ищем, есть ли уже такой тикер
                const existing = assets.find(a => a.t === t);
                if(existing) {
                    const totalQty = existing.q + q;
                    existing.p = ((existing.p * existing.q) + (p * q)) / totalQty; // Средневзвешенная цена
                    existing.q = totalQty;
                } else {
                    assets.push({t, q, p, type});
                }
                localStorage.setItem('v_wealth_final', JSON.stringify(assets));
                render();
            }
        }

        function removeAsset(index) {
            assets.splice(index, 1);
            localStorage.setItem('v_wealth_final', JSON.stringify(assets));
            render();
        }

        async function fetchPrice(t, type) {
            const e = type === 'stock' ? 'shares' : 'bonds';
            const b = type === 'stock' ? 'TQBR' : 'TQOB';
            try {
                const r = await fetch(`https://iss.moex.com/iss/engines/stock/markets/${e}/boards/${b}/securities/${t}.json?iss.meta=off&iss.only=marketdata&marketdata.columns=LAST`);
                const d = await r.json();
                return d.marketdata.data[0][0] || 1000;
            } catch { return 1000; }
        }

        async function check() {
            let total = 0;
            for(let a of assets) { const p = await fetchPrice(a.t, a.type); total += p * a.q; }
            if(total >= 1000000 && !fx) {
                fx = true;
                const c = document.getElementById('fx-canvas'), w = document.getElementById('walter-art'), b = document.getElementById('bullet'), s = document.getElementById('shatter');
                c.style.display = 'block';
                setTimeout(() => { w.style.opacity = '1'; w.style.transform = 'translate(-50%, -42%) scale(1)'; }, 700);
                setTimeout(() => { b.style.opacity = '1'; b.style.animation = 'bullet-hit 0.4s forwards'; }, 2700);
                setTimeout(() => { s.style.opacity = '1'; rain(); }, 3000);
            }
        }

        function rain() {
            const c = document.getElementById('fx-canvas');
            for(let i=0; i<60; i++) {
                setTimeout(() => {
                    const m = document.createElement('div');
                    m.className = 'cash';
                    m.style.left = Math.random() * 100 + 'vw';
                    m.style.animation = `cash-fall ${2.5 + Math.random() * 1}s linear forwards`;
                    m.innerHTML = `<svg viewBox="0 0 100 50"><rect width="100" height="50" fill="#78866b" rx="2"/><path d="M0 25 Q50 0 100 25 T200 25" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="3"/><text x="50" y="35" font-family="Arial" font-size="20" text-anchor="middle" fill="#2d3326" font-weight="bold">$</text></svg>`;
                    c.appendChild(m);
                }, i * 80);
            }
        }

        async function render() {
            let total = 0; let labels = [], values = [];
            const list = document.getElementById('a-list'); list.innerHTML = '';
            
            for(let i = 0; i < assets.length; i++) {
                const a = assets[i];
                const cur = await fetchPrice(a.t, a.type);
                let sum = cur * a.q; total += sum;
                labels.push(a.t); values.push(sum);
                
                list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:20px">
                    <div>
                        <div style="font-weight:600; font-size:16px">${a.t}</div>
                        <div style="font-size:10px; color:var(--gold); font-weight:700">${Math.round(a.q)} шт. @ ${Math.round(a.p)} ₽</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px">
                        <div style="font-weight:600">${Math.round(sum).toLocaleString()} ₽</div>
                        <button class="del-btn" onclick="removeAsset(${i})">×</button>
                    </div>
                </div>`;
            }
            document.getElementById('total-val').innerText = Math.round(total).toLocaleString() + '.00 ₽';
            if(values.length) {
                Plotly.newPlot('chart', [{ 
                    values, labels, type: 'pie', hole: .86, 
                    marker: { colors: ['#1C1C1C', '#3D3D3D', '#5E5E5E', '#AF9675'] }, 
                    textinfo: 'none' 
                }], { paper_bgcolor: 'rgba(0,0,0,0)', showlegend: false, margin: {t:0,b:0,l:0,r:0} }, {displayModeBar: false});
            }
        }
        render();
    </script>
</body>
</html>

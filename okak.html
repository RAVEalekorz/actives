<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>actives | Heisenberg Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        :root { --bg: #F5F5F0; --accent: #8B7355; --text: #2C2C2C; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        .card { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-radius: 24px; padding: 24px; margin: 20px; border: 1px solid rgba(0,0,0,0.05); position: relative; z-index: 1; }
        .val { font-family: 'Montserrat'; font-weight: 800; }
        .header-text { font-family: 'Montserrat'; font-size: 14px; letter-spacing: 2px; text-align: center; padding-top: 20px; color: var(--accent); text-transform: uppercase; }

        input, select { background: #FFF; border: 1px solid #EEE; padding: 16px; border-radius: 12px; width: 100%; margin-bottom: 10px; font-size: 16px; outline: none; }
        button.main-btn { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 14px; width: 100%; font-family: 'Montserrat'; font-weight: 700; font-size: 16px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 20px 0; border-top: 1px solid rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { border: none; background: none; color: #A6A6A6; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .nav-item.active { color: var(--accent); }
        .page { display: none; } .page.active { display: block; }

        /* --- ЭФФЕКТЫ --- */
        #fx-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 999; display: none; }
        
        /* Уолтер */
        #walter-svg { position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%); width: 280px; opacity: 0; transition: opacity 0.5s; }
        
        /* Пуля */
        #bullet { position: absolute; width: 18px; height: 12px; background: #444; border-radius: 50% 20% 20% 50%; left: 50%; bottom: 200px; transform: translateX(-50%); opacity: 0; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        /* Трещины */
        #glass-cracks { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; background: url('https://www.transparentpng.com/download/broken-glass/broken-glass-transparent-background-10.png') no-repeat center/contain; opacity: 0; filter: contrast(0.1) brightness(0.5); }

        /* Купюры */
        .bill { position: absolute; width: 70px; height: 35px; background: #85bb65; border: 2px solid #3d5a2d; border-radius: 3px; top: -50px; z-index: 1001; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .bill::after { content: '$'; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: #3d5a2d; font-weight: bold; font-size: 12px; }

        @keyframes shot { 
            0% { opacity: 1; bottom: 210px; width: 18px; transform: translateX(-50%); } 
            20% { bottom: 50%; width: 18px; transform: translateX(-50%); } 
            25% { bottom: 50%; width: 40px; height: 40px; border-radius: 50%; transform: translate(-50%, -50%) scale(1.5); } 
            100% { opacity: 1; bottom: 0; transform: translate(-50%, 0) scale(0.8); } 
        }
        
        @keyframes walter-fall { 
            0% { transform: translateX(-50%) translateY(0); } 
            20% { transform: translateX(-50%) translateY(30px) rotate(0deg); } 
            100% { transform: translateX(-50%) translateY(200px) rotate(-95deg); opacity: 0; } 
        }
        
        @keyframes money-fall { to { transform: translateY(110vh) rotate(720deg); } }
        @keyframes shake { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(-8px, 8px); } 40% { transform: translate(8px, -8px); } 60% { transform: translate(-8px, -8px); } 80% { transform: translate(8px, 8px); } }
    </style>
</head>
<body>

    <div id="market" class="page active">
        <div class="header-text">Портфель</div>
        <div class="card">
            <select id="type"><option value="stock">Акция</option><option value="bond">Облигация</option></select>
            <input type="text" id="t" placeholder="Тикер"><input type="number" id="q" placeholder="Количество"><input type="number" id="p" placeholder="Цена покупки">
            <button class="main-btn" onclick="addAsset()">Добавить актив</button>
        </div>
        <div class="card" id="assets-list"></div>
    </div>

    <div id="profile" class="page">
        <div class="header-text">Аналитика</div>
        <div class="card" id="main-chart-card" style="text-align: center;">
            <div style="color: #A6A6A6; font-size: 11px; text-transform: uppercase;">Общий баланс</div>
            <div id="total-val" class="val" style="font-size: 32px; color: var(--accent); margin: 10px 0;">0 ₽</div>
            <div id="chart" style="width: 100%; height: 250px;"></div>
        </div>
    </div>

    <div id="fx-overlay">
        <div id="glass-cracks"></div>
        <div id="bullet"></div>
        <div id="walter-svg">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <path d="M100 40c-15 0-25 10-25 25v10h50V65c0-15-10-25-25-25zm-40 40v80h80V80h-80zm20 20h10v10H80v-10zm30 0h10v10h-10v-10z" fill="#1a1a1a"/>
                <path id="arm" d="M140 90l40-5" stroke="#1a1a1a" stroke-width="8" fill="none"/>
            </svg>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="showPage('market', this)">Рынок</button>
        <button class="nav-item" onclick="showPage('profile', this)">Профиль</button>
    </nav>

    <script>
        let portfolio = JSON.parse(localStorage.getItem('portfolio')) || [];
        let totalCash = 0;
        let isAnimating = false;

        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            
            updateUI();

            // ТРИГГЕР: Запуск анимации при переходе в Профиль
            if (id === 'profile' && totalCash >= 1000000 && !isAnimating) {
                triggerMil();
            }
        }

        function addAsset() {
            const t = document.getElementById('t').value.toUpperCase().trim();
            const q = parseFloat(document.getElementById('q').value);
            const p = parseFloat(document.getElementById('p').value);
            if(t && q && p) {
                portfolio.push({t, q, p});
                localStorage.setItem('portfolio', JSON.stringify(portfolio));
                updateUI();
            }
        }

        function triggerMil() {
            isAnimating = true;
            const overlay = document.getElementById('fx-overlay');
            const walter = document.getElementById('walter-svg');
            const bullet = document.getElementById('bullet');
            const cracks = document.getElementById('glass-cracks');
            
            // Сброс стилей перед началом
            overlay.style.display = 'block';
            overlay.style.opacity = '1';
            cracks.style.opacity = '0';
            bullet.style.opacity = '0';
            bullet.style.animation = 'none';
            walter.style.animation = 'none';
            walter.style.opacity = '0';

            // 1. Появление
            setTimeout(() => { walter.style.opacity = '1'; }, 100);
            
            // 2. Выстрел
            setTimeout(() => {
                bullet.style.opacity = '1';
                bullet.style.animation = 'shot 0.7s ease-out forwards';
                document.body.style.animation = 'shake 0.1s 6';
            }, 1000);

            // 3. Трещины
            setTimeout(() => { cracks.style.opacity = '0.6'; }, 1150);

            // 4. Финал: Уолтер падает + Деньги на весь экран
            setTimeout(() => {
                walter.style.animation = 'walter-fall 1.8s cubic-bezier(0.5, 0, 1, 1) forwards';
                
                for(let i=0; i<60; i++) {
                    const bill = document.createElement('div');
                    bill.className = 'bill';
                    bill.style.left = Math.random() * 100 + 'vw';
                    bill.style.animation = `money-fall ${2 + Math.random() * 2}s linear forwards`;
                    bill.style.animationDelay = Math.random() * 2 + 's';
                    overlay.appendChild(bill);
                }
            }, 2000);

            // 5. Очистка (через 7 сек, чтобы успели упасть деньги)
            setTimeout(() => { 
                overlay.style.opacity = '0'; 
                setTimeout(() => { 
                    overlay.style.display = 'none'; 
                    isAnimating = false;
                    // Удаляем старые купюры
                    document.querySelectorAll('.bill').forEach(b => b.remove());
                }, 1000); 
            }, 7000);
        }

        async function updateUI() {
            let total = 0; let labels = [], values = [];
            const list = document.getElementById('assets-list'); list.innerHTML = '';

            portfolio.forEach(a => {
                const sum = 10000 * a.q; // Для теста: 100 акций = 1млн
                total += sum; labels.push(a.t); values.push(sum);
                list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #EEE"><b>${a.t}</b><span class="val">${Math.round(sum).toLocaleString()} ₽</span></div>`;
            });

            totalCash = total;
            document.getElementById('total-val').innerText = Math.round(total).toLocaleString() + ' ₽';
            
            if (values.length > 0 && document.getElementById('profile').classList.contains('active')) {
                Plotly.newPlot('chart', [{ values, labels, type: 'pie', hole: .8, marker: { colors: ['#8B7355', '#D2B48C', '#EBEBEB', '#C4A484'] }, textinfo: 'none' }], 
                { paper_bgcolor: 'rgba(0,0,0,0)', showlegend: false, margin: {t:0, b:0, l:0, r:0} }, {displayModeBar: false});
            }
        }
        updateUI();
    </script>
</body>
</html>
